name: Build & Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      # Root/frontend validation
      - name: Install dependencies (root)
        run: npm install
      - name: Type check (root)
        run: npm run typecheck
      - name: Run tests (root)
        run: npm run test
      - name: Build (root)
        run: npm run build
      # Backend validation
      - name: Install dependencies (backend)
        run: npm install
        working-directory: backend
      - name: Type check (backend)
        run: npm run typecheck
        working-directory: backend
      - name: Run tests (backend)
        run: npm run test
        working-directory: backend
      - name: Build (backend)
        run: npm run build
        working-directory: backend
